<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Berto's Birds | Кастом + Магазин</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(145deg, #0b1a2e 0%, #1a3b5c 100%);
            font-family: 'Segoe UI', Tahoma, system-ui, -apple-system, sans-serif;
            touch-action: manipulation;
            padding: 12px;
        }

        .game-wrapper {
            position: relative;
            border-radius: 32px;
            background: #0f2a3f;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.6), inset 0 0 2px rgba(255, 255, 255, 0.1);
            padding: 12px;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            max-width: 360px;
            border-radius: 24px;
            background: linear-gradient(180deg, #6dc5f0 0%, #3e9fd9 100%);
            box-shadow: inset 0 -4px 8px rgba(0, 0, 0, 0.2), 0 4px 10px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        canvas:active {
            transform: scale(0.99);
        }

        /* Современный скроллбар для магазина (но скрыт, т.к. весь контент на canvas) */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1e3a5a;
        }
        ::-webkit-scrollbar-thumb {
            background: #4f9fff;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <canvas id="gameCanvas" width="360" height="600"></canvas>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            // --- РАЗМЕРЫ ИГРЫ ---
            const canvasW = canvas.width;
            const canvasH = canvas.height;

            // --- СОСТОЯНИЯ ИГРЫ ---
            const GAME_STATE = {
                MENU: 'MENU',
                SHOP: 'SHOP',
                PLAYING: 'PLAYING',
                GAMEOVER: 'GAMEOVER'
            };
            let gameState = GAME_STATE.MENU;

            // --- ПЕРЕМЕННЫЕ ПРОГРЕССА ---
            let totalScore = 0;
            let purchasedSkins = [true, false, false];
            let currentSkinIndex = 0;
            const skinPrices = [0, 50, 150];
            const skinFiles = [
                'data/bird.png',
                'data/bird2.png',
                'data/bird3.png'
            ];
            
            // Цвета-заглушки для скинов (на случай отсутствия картинок)
            const skinColors = ['#FFB347', '#FF6B8B', '#5FD9C5'];

            // --- ЗАГРУЗКА ИЗОБРАЖЕНИЙ СКИНОВ С ОБРАБОТКОЙ ОШИБОК ---
            let skinImages = [];
            let skinImagesLoaded = [false, false, false];
            let currentBirdImage = null;

            function preloadSkins() {
                for (let i = 0; i < skinFiles.length; i++) {
                    let img = new Image();
                    
                    img.onload = (function(index) {
                        return function() {
                            skinImagesLoaded[index] = true;
                            if (index === currentSkinIndex) {
                                currentBirdImage = this;
                            }
                        };
                    })(i);
                    
                    img.onerror = (function(index) {
                        return function() {
                            console.warn(`⚠️ Скин ${index + 1} не загружен`);
                            skinImagesLoaded[index] = false;
                            if (index === currentSkinIndex) {
                                currentBirdImage = null;
                            }
                        };
                    })(i);
                    
                    img.src = skinFiles[i];
                    skinImages.push(img);
                }
                
                currentBirdImage = skinImages[0];
            }
            preloadSkins();

            // --- РАБОТА С LOCALSTORAGE ---
            function loadProgress() {
                try {
                    const savedTotal = localStorage.getItem('flappy_totalScore');
                    if (savedTotal) totalScore = parseInt(savedTotal, 10) || 0;

                    const savedPurchased = localStorage.getItem('flappy_purchased');
                    if (savedPurchased) {
                        let arr = savedPurchased.split(',').map(v => v === 'true');
                        if (arr.length === 3) purchasedSkins = arr;
                    }

                    const savedCurrent = localStorage.getItem('flappy_currentSkin');
                    if (savedCurrent) {
                        let idx = parseInt(savedCurrent, 10);
                        if (idx >= 0 && idx < 3) currentSkinIndex = idx;
                    }
                } catch (e) {
                    console.warn('Ошибка загрузки прогресса', e);
                }
                
                purchasedSkins[0] = true;
                currentSkinIndex = Math.min(currentSkinIndex, 2);
                
                if (skinImagesLoaded[currentSkinIndex]) {
                    currentBirdImage = skinImages[currentSkinIndex];
                } else {
                    currentBirdImage = null;
                }
            }

            function saveProgress() {
                try {
                    localStorage.setItem('flappy_totalScore', totalScore.toString());
                    localStorage.setItem('flappy_purchased', purchasedSkins.join(','));
                    localStorage.setItem('flappy_currentSkin', currentSkinIndex.toString());
                } catch (e) {}
            }

            loadProgress();

            // --- ПЕРЕМЕННЫЕ ИГРЫ ---
            let score = 0;
            const bird = {
                x: 80,
                y: canvasH / 2,
                radius: 15,
                velocity: 0,
                gravity: 0.2,
                jumpPower: -5,
                color: skinColors[currentSkinIndex]
            };
            const pipeWidth = 60;
            const pipeGap = 150;
            const pipeSpeed = 2;
            let pipes = [];

            // --- ФУНКЦИЯ РИСОВАНИЯ ТРУБЫ (улучшенный дизайн) ---
            function drawPipe(x, y, isTop) {
                const tileSize = 20;
                let pipeHeight;
                if (isTop) {
                    pipeHeight = y;
                } else {
                    pipeHeight = canvasH - (y + pipeGap);
                }
                
                // Тень трубы
                ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
                ctx.shadowBlur = 6;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;
                
                for (let row = 0; row < Math.ceil(pipeHeight / tileSize); row++) {
                    for (let col = 0; col < Math.ceil(pipeWidth / tileSize); col++) {
                        let tileX = x + col * tileSize;
                        let tileY;
                        if (isTop) {
                            tileY = row * tileSize;
                        } else {
                            tileY = (y + pipeGap) + row * tileSize;
                        }
                        
                        if (tileY < 0 || tileY > canvasH) continue;
                        if (isTop && tileY > y) continue;
                        if (!isTop && tileY + tileSize > canvasH) continue;
                        
                        // Основной цвет трубы с градиентом
                        const gradient = ctx.createLinearGradient(tileX, tileY, tileX + tileSize, tileY + tileSize);
                        gradient.addColorStop(0, '#3b8c3e');
                        gradient.addColorStop(1, '#2a6b2d');
                        ctx.fillStyle = gradient;
                        ctx.fillRect(tileX, tileY, tileSize-1, tileSize-1);
                        
                        // Обводка
                        ctx.strokeStyle = '#1e4a21';
                        ctx.lineWidth = 1.5;
                        ctx.strokeRect(tileX, tileY, tileSize-1, tileSize-1);
                        
                        // Светлая полоска для объема
                        ctx.fillStyle = '#6bbf6e';
                        ctx.fillRect(tileX+3, tileY+3, tileSize-8, 3);
                    }
                }
                
                // Края трубы (верх/низ)
                ctx.shadowBlur = 0;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
                
                ctx.fillStyle = '#2a6b2d';
                ctx.strokeStyle = '#1e4a21';
                ctx.lineWidth = 2;
                
                if (isTop) {
                    ctx.fillRect(x - 5, y - 8, pipeWidth + 10, 8);
                    ctx.strokeRect(x - 5, y - 8, pipeWidth + 10, 8);
                } else {
                    ctx.fillRect(x - 5, y + pipeGap, pipeWidth + 10, 8);
                    ctx.strokeRect(x - 5, y + pipeGap, pipeWidth + 10, 8);
                }
            }

            // --- ФУНКЦИЯ РИСОВАНИЯ ПТИЦЫ (БЕЗ ИЗМЕНЕНИЙ) ---
            function drawBird() {
                if (currentBirdImage && 
                    skinImagesLoaded[currentSkinIndex] && 
                    currentBirdImage.complete && 
                    currentBirdImage.naturalWidth > 0) {
                    
                    ctx.drawImage(
                        currentBirdImage,
                        bird.x - bird.radius,
                        bird.y - bird.radius,
                        bird.radius * 2,
                        bird.radius * 2
                    );
                } else {
                    ctx.beginPath();
                    ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
                    ctx.fillStyle = skinColors[currentSkinIndex];
                    ctx.fill();
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 12px Arial';
                    ctx.fillText(currentSkinIndex + 1, bird.x - 5, bird.y + 5);
                }
            }

            // --- УЛУЧШЕННОЕ МЕНЮ ---
            function drawMenu() {
                // Полупрозрачный оверлей с размытием (имитация)
                ctx.fillStyle = 'rgba(10, 20, 30, 0.8)';
                ctx.fillRect(0, 0, canvasW, canvasH);
                
                // Декоративные элементы
                ctx.shadowColor = 'cyan';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.arc(180, 150, 80, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(100, 200, 255, 0.3)';
                ctx.lineWidth = 8;
                ctx.stroke();
                ctx.shadowBlur = 0;
                
                ctx.fillStyle = 'white';
                ctx.shadowColor = '#00aaff';
                ctx.shadowBlur = 10;
                ctx.font = 'bold 44px "Segoe UI", Arial';
                ctx.fillText('BERTOs', 102, 150);
                ctx.font = 'bold 36px "Segoe UI", Arial';
                ctx.fillText('BIRDS', 127, 200);
                ctx.shadowBlur = 0;
                
                // Кнопки с градиентом
                const drawButton = (text, y, color) => {
                    const gradient = ctx.createLinearGradient(100, y, 260, y + 50);
                    gradient.addColorStop(0, color);
                    gradient.addColorStop(1, shadeColor(color, -20));
                    
                    ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    ctx.shadowBlur = 10;
                    ctx.shadowOffsetY = 3;
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.roundRect(100, y, 160, 50, 15);
                    ctx.fill();
                    
                    ctx.shadowBlur = 0;
                    ctx.shadowOffsetY = 0;
                    
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 26px "Segoe UI", Arial';
                    ctx.fillText(text, 140, y + 36);
                };
                
                // Добавляем метод roundRect
                CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                    if (w < 2 * r) r = w / 2;
                    if (h < 2 * r) r = h / 2;
                    this.moveTo(x + r, y);
                    this.lineTo(x + w - r, y);
                    this.quadraticCurveTo(x + w, y, x + w, y + r);
                    this.lineTo(x + w, y + h - r);
                    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                    this.lineTo(x + r, y + h);
                    this.quadraticCurveTo(x, y + h, x, y + h - r);
                    this.lineTo(x, y + r);
                    this.quadraticCurveTo(x, y, x + r, y);
                    return this;
                };
                
                drawButton('Играть', 250, '#4CAF50');
                drawButton('Магазин', 320, '#2196F3');
            }

            // --- УЛУЧШЕННЫЙ МАГАЗИН ---
            function drawShop() {
                // Фон с градиентом
                const gradient = ctx.createLinearGradient(0, 0, 0, canvasH);
                gradient.addColorStop(0, '#132b44');
                gradient.addColorStop(1, '#0a1a28');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvasW, canvasH);
                
                ctx.fillStyle = 'white';
                ctx.shadowColor = '#00aaff';
                ctx.shadowBlur = 10;
                ctx.font = 'bold 22px "Segoe UI", Arial';
                ctx.fillText(`💰 Баланс: ${totalScore}`, 20, 40);
                ctx.shadowBlur = 0;
                
                // Кнопка назад (стильная)
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 8;
                ctx.shadowOffsetY = 2;
                
                ctx.fillStyle = '#f44336';
                ctx.beginPath();
                ctx.roundRect(20, 60, 90, 40, 12);
                ctx.fill();
                
                ctx.fillStyle = 'white';
                ctx.font = 'bold 18px "Segoe UI", Arial';
                ctx.fillText('← Назад', 28, 88);
                
                ctx.fillStyle = 'white';
                ctx.font = 'bold 28px "Segoe UI", Arial';
                ctx.fillText('Скины', 130, 110);
                
                for (let i = 0; i < 3; i++) {
                    let y = 150 + i * 95;
                    
                    // Карточка скина
                    ctx.shadowBlur = 12;
                    ctx.shadowOffsetY = 4;
                    
                    // Фон карточки
                    const cardGradient = ctx.createLinearGradient(40, y, 320, y + 80);
                    cardGradient.addColorStop(0, purchasedSkins[i] ? '#1e4a2e' : '#34495e');
                    cardGradient.addColorStop(1, purchasedSkins[i] ? '#0e3a1e' : '#2c3e50');
                    
                    ctx.fillStyle = cardGradient;
                    ctx.beginPath();
                    ctx.roundRect(40, y, 280, 80, 16);
                    ctx.fill();
                    
                    // Рамка выбранного скина
                    if (currentSkinIndex === i && purchasedSkins[i]) {
                        ctx.strokeStyle = '#FFD700';
                        ctx.lineWidth = 3;
                        ctx.stroke();
                    }
                    
                    // Иконка скина
                    ctx.shadowBlur = 8;
                    ctx.beginPath();
                    ctx.arc(75, y+40, 22, 0, 2*Math.PI);
                    ctx.fillStyle = skinColors[i];
                    ctx.fill();
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    ctx.shadowBlur = 0;
                    ctx.shadowOffsetY = 0;
                    
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 18px "Segoe UI", Arial';
                    ctx.fillText(`Скин ${i+1}`, 110, y+28);
                    
                    ctx.font = '14px "Segoe UI", Arial';
                    if (purchasedSkins[i]) {
                        ctx.fillStyle = '#b0e0b0';
                        ctx.fillText('✓ приобретен', 110, y+55);
                    } else {
                        ctx.fillStyle = '#f1c40f';
                        ctx.fillText(`⚡ ${skinPrices[i]} монет`, 110, y+55);
                    }
                    
                    // Кнопка действия
                    let btnText = '';
                    let btnColor = '';
                    if (purchasedSkins[i]) {
                        if (currentSkinIndex === i) {
                            btnText = 'ВЫБРАН';
                            btnColor = '#27ae60';
                        } else {
                            btnText = 'ВЫБРАТЬ';
                            btnColor = '#2980b9';
                        }
                    } else {
                        if (totalScore >= skinPrices[i]) {
                            btnText = 'КУПИТЬ';
                            btnColor = '#e67e22';
                        } else {
                            btnText = 'НЕДОСТ.';
                            btnColor = '#7f8c8d';
                        }
                    }
                    
                    ctx.shadowBlur = 6;
                    ctx.shadowOffsetY = 2;
                    
                    ctx.fillStyle = btnColor;
                    ctx.beginPath();
                    ctx.roundRect(215, y+20, 90, 40, 10);
                    ctx.fill();
                    
                    ctx.shadowBlur = 0;
                    
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 14px "Segoe UI", Arial';
                    ctx.fillText(btnText, 225, y+48);
                }
                
                // Сброс теней
                ctx.shadowBlur = 0;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
            }

            // --- GAME OVER СТИЛЬ ---
            function drawGameOver() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
                ctx.fillRect(0, 0, canvasW, canvasH);
                
                ctx.shadowColor = '#ff0000';
                ctx.shadowBlur = 15;
                ctx.fillStyle = '#ff5555';
                ctx.font = 'bold 34px "Segoe UI", Arial';
                ctx.fillText('GAME OVER', 90, 270);
                
                ctx.shadowBlur = 8;
                ctx.fillStyle = 'white';
                ctx.font = '22px "Segoe UI", Arial';
                ctx.fillText('👆 Тапни', 130, 350);
                
                ctx.shadowBlur = 0;
            }

            // --- ОБНОВЛЕНИЕ ИГРЫ ---
            function update() {
                if (gameState !== GAME_STATE.PLAYING) return;

                bird.velocity += bird.gravity;
                bird.y += bird.velocity;

                if (bird.y - bird.radius <= 0 || bird.y + bird.radius >= canvasH) {
                    gameState = GAME_STATE.GAMEOVER;
                    return;
                }

                for (let i = pipes.length - 1; i >= 0; i--) {
                    pipes[i].x -= pipeSpeed;
                    if (pipes[i].x + pipeWidth < 0) {
                        pipes.splice(i, 1);
                    }
                }

                if (pipes.length === 0 || pipes[pipes.length-1].x < canvasW - 200) {
                    let topHeight = Math.random() * (canvasH - pipeGap - 100) + 50;
                    pipes.push({
                        x: canvasW,
                        topHeight: topHeight,
                        passed: false
                    });
                }

                for (let p of pipes) {
                    if (bird.x + bird.radius > p.x && bird.x - bird.radius < p.x + pipeWidth) {
                        if (bird.y - bird.radius < p.topHeight || bird.y + bird.radius > p.topHeight + pipeGap) {
                            gameState = GAME_STATE.GAMEOVER;
                            return;
                        }
                    }
                }

                for (let p of pipes) {
                    if (p.x + pipeWidth < bird.x && !p.passed) {
                        score++;
                        totalScore++;
                        p.passed = true;
                        saveProgress();
                    }
                }
            }

            // --- ОТРИСОВКА ---
            function draw() {
                // Небо с градиентом
                const skyGradient = ctx.createLinearGradient(0, 0, 0, canvasH);
                skyGradient.addColorStop(0, '#7ec8f0');
                skyGradient.addColorStop(0.7, '#4aa3d1');
                ctx.fillStyle = skyGradient;
                ctx.fillRect(0, 0, canvasW, canvasH);
                
                // Облачка (декор)
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.arc(50, 80, 30, 0, Math.PI*2);
                ctx.arc(90, 60, 25, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(280, 120, 35, 0, Math.PI*2);
                ctx.arc(320, 100, 20, 0, Math.PI*2);
                ctx.fill();

                // Трубы
                for (let p of pipes) {
                    drawPipe(p.x, p.topHeight, true);
                    drawPipe(p.x, p.topHeight, false);
                }

                // Птица
                drawBird();

                // Счёт
                if (gameState === GAME_STATE.PLAYING || gameState === GAME_STATE.GAMEOVER) {
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 48px "Segoe UI", Arial';
                    ctx.shadowColor = 'rgba(0,0,0,0.7)';
                    ctx.shadowBlur = 10;
                    ctx.shadowOffsetX = 2;
                    ctx.shadowOffsetY = 2;
                    ctx.fillText(score, canvasW/2 - 20, 80);
                    ctx.shadowBlur = 0;
                    ctx.shadowOffsetX = 0;
                    ctx.shadowOffsetY = 0;
                }

                // Меню / Магазин / Game Over
                if (gameState === GAME_STATE.MENU) {
                    drawMenu();
                } else if (gameState === GAME_STATE.SHOP) {
                    drawShop();
                } else if (gameState === GAME_STATE.GAMEOVER) {
                    drawGameOver();
                }
            }

            // Вспомогательная функция для затемнения цвета
            function shadeColor(color, percent) {
                let R = parseInt(color.substring(1,3),16);
                let G = parseInt(color.substring(3,5),16);
                let B = parseInt(color.substring(5,7),16);
                R = Math.min(255, Math.max(0, R + percent));
                G = Math.min(255, Math.max(0, G + percent));
                B = Math.min(255, Math.max(0, B + percent));
                return `#${(R < 16 ? '0' : '') + R.toString(16)}${(G < 16 ? '0' : '') + G.toString(16)}${(B < 16 ? '0' : '') + B.toString(16)}`;
            }

            // --- КООРДИНАТЫ КЛИКА ---
            function getCanvasCoords(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                return {
                    x: (clientX - rect.left) * scaleX,
                    y: (clientY - rect.top) * scaleY
                };
            }

            // --- ОБРАБОТКА КЛИКОВ ---
            function handleMenuClick(x, y) {
                if (x >= 100 && x <= 260 && y >= 250 && y <= 300) {
                    gameState = GAME_STATE.PLAYING;
                    bird.y = canvasH/2;
                    bird.velocity = 0;
                    pipes = [];
                    score = 0;
                }
                if (x >= 100 && x <= 260 && y >= 320 && y <= 370) {
                    gameState = GAME_STATE.SHOP;
                }
            }

            function handleShopClick(x, y) {
                if (x >= 20 && x <= 110 && y >= 60 && y <= 100) {
                    gameState = GAME_STATE.MENU;
                    return;
                }

                for (let i = 0; i < 3; i++) {
                    let skinY = 150 + i * 95;
                    let btnX = 215, btnY = skinY + 20, btnW = 90, btnH = 40;
                    
                    if (x >= btnX && x <= btnX+btnW && y >= btnY && y <= btnY+btnH) {
                        if (purchasedSkins[i]) {
                            if (currentSkinIndex !== i) {
                                currentSkinIndex = i;
                                bird.color = skinColors[i];
                                
                                if (skinImagesLoaded[i]) {
                                    currentBirdImage = skinImages[i];
                                } else {
                                    currentBirdImage = null;
                                }
                                saveProgress();
                            }
                        } else {
                            if (totalScore >= skinPrices[i]) {
                                totalScore -= skinPrices[i];
                                purchasedSkins[i] = true;
                                currentSkinIndex = i;
                                bird.color = skinColors[i];
                                
                                if (skinImagesLoaded[i]) {
                                    currentBirdImage = skinImages[i];
                                } else {
                                    currentBirdImage = null;
                                }
                                saveProgress();
                            }
                        }
                        return;
                    }
                }
            }

            function handleTap(e) {
                e.preventDefault();
                const { x, y } = getCanvasCoords(e);

                switch (gameState) {
                    case GAME_STATE.MENU:
                        handleMenuClick(x, y);
                        break;
                    case GAME_STATE.SHOP:
                        handleShopClick(x, y);
                        break;
                    case GAME_STATE.PLAYING:
                        bird.velocity = bird.jumpPower;
                        break;
                    case GAME_STATE.GAMEOVER:
                        gameState = GAME_STATE.MENU;
                        break;
                }
            }

            // --- ЗАПУСК ---
            canvas.addEventListener('touchstart', handleTap, { passive: false });
            canvas.addEventListener('mousedown', handleTap);

            function gameLoop() {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }
            gameLoop();
        })();
    </script>
</body>
</html>
